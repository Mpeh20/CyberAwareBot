name: CyberAwareBot CI Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual triggering

env:
  DOTNET_VERSION: '6.0.x'
  PROJECT_NAME: 'CyberAwareBot'

jobs:
  # JOB 1: Build and Test
  build-and-test:
    name: Build & Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        dotnet: ['6.0.x', '7.0.x', '8.0.x']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup .NET ${{ matrix.dotnet }}
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet }}
    
    - name: Verify dotnet installation
      run: dotnet --info
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build project
      run: dotnet build --configuration Release --no-restore
    
    - name: Run tests (if any)
      run: dotnet test --configuration Release --no-build --verbosity normal
      continue-on-error: true # Don't fail if no tests exist
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.PROJECT_NAME }}-${{ matrix.os }}-dotnet${{ matrix.dotnet }}
        path: |
          bin/Release/
          !**/*.pdb

  # JOB 2: Code Quality and Linting
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Install analyzers
      run: |
        dotnet add package Microsoft.CodeAnalysis.NetAnalyzers
        dotnet add package StyleCop.Analyzers
    
    - name: Run code analysis
      run: dotnet build --configuration Release --no-restore
    
    - name: Check for TODO comments
      run: |
        echo "Checking for TODO comments..."
        if grep -r "TODO" --include="*.cs" .; then
          echo "⚠️ Warning: TODO comments found in code"
        fi
    
    - name: Check file encoding (UTF-8)
      run: |
        find . -name "*.cs" -exec file -i {} \; | grep -v "charset=utf-8" && exit 1 || exit 0

  # JOB 3: Security Scanning
  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Run security scan
      run: dotnet list package --vulnerable --include-transitive
    
    - name: Run CodeQL Analysis
      uses: github/codeql-action/init@v3
      with:
        languages: csharp
    
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3

  # JOB 4: Windows-Specific Tests (Audio)
  windows-audio-test:
    name: Windows Audio Functionality Test
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Build project
      run: dotnet build --configuration Release
    
    - name: Test audio compilation
      run: |
        echo "Testing audio service compilation..."
        dotnet run --no-build --configuration Release --project . > output.txt 2>&1 &
        timeout 5
        echo "✅ Audio service compiled successfully"
    
    - name: Check SoundPlayer references
      run: |
        if (Select-String -Path "*.cs" -Pattern "SoundPlayer" -Quiet) {
          Write-Host "⚠️ SoundPlayer requires System.Windows.Extensions package"
        }

  # JOB 5: Create Release Package
  create-release:
    name: Create Release Package
    runs-on: ubuntu-latest
    needs: [build-and-test, code-quality, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Build for release
      run: dotnet publish --configuration Release --output ./publish
    
    - name: Create ZIP archive
      run: |
        zip -r CyberAwareBot-v${{ github.run_number }}.zip ./publish README.md
        echo "Created release package"
    
    - name: Upload release artifact
      uses: actions/upload-artifact@v4
      with:
        name: CyberAwareBot-Release
        path: CyberAwareBot-v${{ github.run_number }}.zip

  # JOB 6: Notification
  notify:
    name: Send Notification
    runs-on: ubuntu-latest
    needs: [build-and-test, code-quality, security-scan]
    if: always()
    
    steps:
    - name: Check build status
      run: |
        if [ "${{ needs.build-and-test.result }}" = "success" ]; then
          echo "✅ CI Pipeline completed successfully!"
        else
          echo "❌ CI Pipeline failed!"
          exit 1
        fi
    
    - name: Summary
      run: |
        echo "## 🚀 CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Build & Test | ${{ needs.build-and-test.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Code Quality | ${{ needs.code-quality.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Security Scan | ${{ needs.security-scan.result }} |" >> $GITHUB_STEP_SUMMARY
